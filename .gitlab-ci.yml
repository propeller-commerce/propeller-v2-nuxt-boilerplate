# CI for the propeller-nuxt boilerplate.
#
# Unlike propeller-next / propeller-vue, this repo has no GitLab deploy
# pipeline - its only CI responsibility is to publish a SCRUBBED public mirror
# and cut GitHub Releases. Two stages:
#
#   mirror   - one-way, scrubbed mirror of develop/master to the public GitHub
#              repo. This boilerplate tracks private development files
#              (CLAUDE.md + the memory/ notes) that must NEVER reach the public
#              mirror; the job strips them in an ephemeral commit built on the
#              CI runner and force-pushes THAT to GitHub. GitLab is never pushed
#              to and remains untouched.
#
#   release  - automatic GitHub Release on the mirrored commit, idempotent and
#              Unreleased-gated, identical contract to the UI packages.
#
# Required GitLab CI/CD variables (Settings -> CI/CD -> Variables), Masked +
# Protected:
#   GITHUB_TOKEN  repo-scoped token for the mirror + release jobs.

stages:
  - mirror
  - release

mirror_to_github:
  stage: mirror
  image:
    name: alpine/git:latest
    entrypoint: [""]
  only:
    - master
    - main
  before_script:
    - git --version
  script:
    - echo "Mirroring to GitHub (scrubbed)..."
    - test -n "${GITHUB_TOKEN}" || { echo "GITHUB_TOKEN is empty (is the branch protected?); aborting."; exit 1; }
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/propeller-commerce/propeller-v2-nuxt-boilerplate.git || true
    - git fetch origin --unshallow || git fetch origin || true
    - git rm -r --cached --ignore-unmatch .claude CLAUDE.md frontend/CLAUDE.md memory Taskfile.yml >/dev/null 2>&1 || true
    - 'git commit -m "chore(mirror): strip private dev files for public mirror" --no-verify || echo "nothing to scrub"'
    - git push --no-thin github HEAD:refs/heads/master --force
    - git push --no-thin github --tags --force
  when: on_success
  allow_failure: false

release_to_github:
  stage: release
  image:
    name: alpine/git:latest
    entrypoint: [""]
  only:
    - master
    - main
  needs:
    - mirror_to_github
  before_script:
    - apk add --no-cache jq curl >/dev/null 2>&1 || true
  script:
    - echo "Evaluating release gate..."
    - VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n1)
    - 'echo "package.json version: ${VERSION}"'
    - test -n "$VERSION" || { echo "Could not parse version; aborting."; exit 1; }
    - TAG="v${VERSION}"
    - test -n "${GITHUB_TOKEN}" || { echo "GITHUB_TOKEN is empty; aborting."; exit 1; }
    - git remote add github https://x-access-token:${GITHUB_TOKEN}@github.com/propeller-commerce/propeller-v2-nuxt-boilerplate.git || true
    - |
      if git ls-remote --tags github "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "Tag ${TAG} already on GitHub - release already cut, nothing to do.";
        exit 0;
      fi
    - |
      if grep -Eiq "^##[[:space:]]*\[${VERSION}\][^\n]*unreleased" CHANGELOG.md; then
        echo "CHANGELOG marks ${VERSION} as Unreleased - skipping release per policy.";
        exit 0;
      fi
    - |
      awk -v ver="$VERSION" '
        $0 ~ ("^## [[]" ver "[]]") {grab=1; next}
        grab && $0 ~ "^## [[]" {exit}
        grab {print}
      ' CHANGELOG.md > RELEASE_BODY.md
    - test -s RELEASE_BODY.md || { echo "Empty CHANGELOG section for ${VERSION}; aborting."; exit 1; }
    - 'echo "--- release body ---"; cat RELEASE_BODY.md'
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git tag -a "${TAG}" -m "Release ${TAG}" || true
    - git push --no-thin github "refs/tags/${TAG}"
    - |
      PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "$TAG" \
        --rawfile body RELEASE_BODY.md \
        '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')
      HTTP=$(curl -sS -o resp.json -w "%{http_code}" -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/propeller-commerce/propeller-v2-nuxt-boilerplate/releases \
        -d "$PAYLOAD")
      echo "GitHub API HTTP ${HTTP}"; cat resp.json
      case "$HTTP" in 2*) echo "Release ${TAG} created.";; *) echo "Release API call failed."; exit 1;; esac
  when: on_success
  allow_failure: true
